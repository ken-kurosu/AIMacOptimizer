/* ===== デモ（S4：実測カウントアップ＋ゲージ） ===== */
var reduced = false;
try { reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
var demo = { gauge: 72, freed: 0, played: false };
function demoPaint(){
  var C = 527.8;
  el('#demoGaugeArc').setAttribute('stroke-dashoffset', (C * (1 - demo.gauge / 100)).toFixed(1));
  el('#demoGaugePct').textContent = Math.round(demo.gauge) + '%';
  el('#demoFreed').textContent = '−' + demo.freed.toFixed(2) + ' GB';
}
function setResultLabel(shown){ el('#demoResultLabel').style.opacity = shown ? '1' : '0.45'; }
function tween(dur, ease, onFrame){
  return new Promise(function(resolve){
    var t0 = performance.now();
    function step(now){
      var p = Math.min(1, (now - t0) / dur);
      onFrame(ease(p));
      if (p < 1) requestAnimationFrame(step); else resolve();
    }
    requestAnimationFrame(step);
  });
}
function wait(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }
async function runDemo(){
  demo.played = true; demo.gauge = 72; demo.freed = 0; demoPaint(); setResultLabel(false);
  await wait(500);
  el('#demoBtn').style.transform = 'scale(0.96)'; await wait(170); el('#demoBtn').style.transform = 'scale(1)';
  await wait(200);
  var easeInOutCubic = function(p){ return p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2, 3)/2; };
  var easeOutExpo = function(p){ return p === 1 ? 1 : 1 - Math.pow(2, -10*p); };
  await Promise.all([
    tween(1400, easeInOutCubic, function(v){ demo.gauge = 72 - 24*v; demoPaint(); }),
    tween(1200, easeOutExpo, function(v){ demo.freed = 1.2*v; demoPaint(); })
  ]);
  demo.gauge = 48; demo.freed = 1.2; demoPaint(); setResultLabel(true);
}
function replayDemo(){ if (!reduced) runDemo(); }
function setupDemoTrigger(){
  if (reduced) return;
  var elDemo = el('[data-demo]');
  if (!elDemo) return;
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if (en.isIntersecting && !demo.played){ io.disconnect(); runDemo(); }
    });
  }, { threshold: 0.5 });
  io.observe(elDemo);
}

  var diskCard = sec.querySelector('[data-card="disk"]');
  var aiCard = sec.querySelector('[data-card="ai"]');
  var showCard = function(elm, on){ if (!elm) return; elm.style.opacity = on ? '1' : '0'; elm.style.transform = on ? 'scale(1) translateY(0)' : 'scale(0.85) translateY(14px)'; };
  var pctEl = sec.querySelector('[data-hud-pct]');
  var barEl = sec.querySelector('[data-hud-bar]');
  var freedWrap = sec.querySelector('[data-hud-freed]');
  var freedNum = sec.querySelector('[data-hud-freed-num]');
  var apply = function(p){
    showCard(diskCard, p > 0.28);
    showCard(aiCard, p > 0.5);
    if (mac) mac.style.transform = 'scale(' + (0.92 + 0.14*p).toFixed(4) + ') translateY(' + (-22*p).toFixed(1) + 'px)';
    var q = Math.max(0, Math.min(1, (p - 0.12) / 0.72));
    var pct = Math.round(77 - 29*q);
    if (pctEl) pctEl.textContent = pct + '%';
    if (barEl){ barEl.style.width = pct + '%'; barEl.style.background = q > 0.55 ? 'linear-gradient(90deg,#1FA463,#34C759)' : 'linear-gradient(90deg,#FEBC2E,#FF9F0A)'; }
    if (freedWrap) freedWrap.style.opacity = q > 0.1 ? '1' : '0.25';
    if (freedNum) freedNum.textContent = '−' + (1.2*q).toFixed(2) + ' GB';
  };
  if (reduced){ apply(1); return; }
  var ticking = false;
  var onScroll = function(){
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(function(){
      ticking = false;
      var vh = window.innerHeight;
      var rect = sec.getBoundingClientRect();
      var total = Math.max(1, sec.offsetHeight - vh);
      apply(Math.max(0, Math.min(1, -rect.top / total)));
    });
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
}

/* ===== チャットの段階表示（S7） ===== */
function setupChatReveal(){
  var group = el('[data-chat-group]');
  if (!group) return;
  var parts = Array.prototype.slice.call(group.querySelectorAll('[data-chat-part]'));
  if (reduced){ parts.forEach(function(p){ p.style.opacity = '1'; p.style.transform = 'none'; }); return; }
  parts.forEach(function(p){ p.style.opacity = '0'; p.style.transform = 'translateY(14px)'; p.style.transition = 'opacity .55s cubic-bezier(0.22,1,0.36,1), transform .55s cubic-bezier(0.22,1,0.36,1)'; });
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if (en.isIntersecting){
        io.disconnect();
        parts.forEach(function(p, i){ setTimeout(function(){ p.style.opacity = '1'; p.style.transform = 'translateY(0)'; }, i * 500); });
      }
    });
  }, { threshold: 0.6 });
  io.observe(group);
}

/* ===== セクションのフェードイン ===== */
function setupReveals(){
  if (reduced) return;
  var list = els('[data-reveal]');
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if (en.isIntersecting){ en.target.style.opacity = '1'; en.target.style.transform = 'translateY(0)'; io.unobserve(en.target); }
    });
  }, { threshold: 0.12 });
  list.forEach(function(elm){
    var r = elm.getBoundingClientRect();
    if (r.top > window.innerHeight * 0.85){
      elm.style.opacity = '0';
      elm.style.transform = 'translateY(24px)';
      elm.style.transition = 'opacity .7s cubic-bezier(0.22,1,0.36,1), transform .7s cubic-bezier(0.22,1,0.36,1)';
      io.observe(elm);
    }
  });
}

/* ===== S3 CPU 負荷グラフ ===== */
var graphState = { sys: null, user: null, started: false };
function startGraph(){
  if (graphState.started) return;
  var cv = el('#cpuGraph');
  if (!cv) return;
  graphState.started = true;
  var N = 100;
  graphState.sys = new Array(N).fill(0.05);
  graphState.user = new Array(N).fill(0.08);
  if (reduced){
    for (var i = 0; i < N; i++){ graphState.sys[i] = 0.30 + 0.12*Math.abs(Math.sin(i*0.5)); graphState.user[i] = 0.42 + 0.22*Math.abs(Math.sin(i*0.7)); }
    el('#amSys').textContent = '34%'; el('#amUser').textContent = '48%';
    drawGraph();
    return;
  }
  var t0 = performance.now();
  var lastPush = 0;
  function loop(now){
    if (now - lastPush > 45){
      lastPush = now;
      var elapsed = (now - t0) / 1000;
      var ramp = Math.min(1, elapsed / 4);
      var base = 0.15 + 0.6*ramp;
      var spike = Math.random() < 0.12 ? Math.random()*0.35 : 0;
      var sys = base*0.5 + Math.random()*0.08 + spike*0.5;
      var user = base*0.7 + Math.random()*0.12 + spike;
      sys = Math.max(0.02, Math.min(1, sys));
      user = Math.max(0.02, Math.min(1, user));
      graphState.sys.push(sys); graphState.sys.shift();
      graphState.user.push(user); graphState.user.shift();
    }
    drawGraph();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  setInterval(function(){
    var sv = graphState.sys[graphState.sys.length - 1];
    var uv = graphState.user[graphState.user.length - 1];
    el('#amSys').textContent = Math.round(sv*60 + 6) + '%';
    el('#amUser').textContent = Math.round(uv*60 + 6) + '%';
  }, 700);
}
function drawGraph(){
  var cv = el('#cpuGraph');
  if (!cv) return;
  var dpr = window.devicePixelRatio || 1;
  var w = cv.clientWidth || 400;
  var h = cv.clientHeight || 200;
  if (cv.width !== Math.round(w*dpr) || cv.height !== Math.round(h*dpr)){ cv.width = Math.round(w*dpr); cv.height = Math.round(h*dpr); }
  var ctx = cv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (var i = 1; i < 4; i++){ var y = h*i/4; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
  var sys = graphState.sys, user = graphState.user, N = sys.length;
  var xAt = function(i){ return w*i/(N-1); };
  var yAt = function(v){ return h - v*h*0.9 - 4; };
  var area = function(arr, fill, stroke){
    ctx.beginPath();
    ctx.moveTo(0, h);
    for (var i = 0; i < N; i++) ctx.lineTo(xAt(i), yAt(arr[i]));
    ctx.lineTo(w, h);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.beginPath();
    for (var j = 0; j < N; j++){ if (j === 0) ctx.moveTo(xAt(j), yAt(arr[j])); else ctx.lineTo(xAt(j), yAt(arr[j])); }
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.6;
    ctx.stroke();
  };
  area(sys, 'rgba(255,95,87,0.28)', '#FF5F57');
  area(user, 'rgba(76,155,255,0.26)', '#4C9BFF');
}

/* ===== 起動 ===== */
(function init(){
  var lang = null;
  try { lang = localStorage.getItem('amo-lang'); } catch (e) {}
  if (!lang){
    var nav = (navigator.language || 'ja').toLowerCase();
    lang = nav.indexOf('ja') === 0 ? 'ja' : nav.indexOf('zh') === 0 ? 'zh' : 'en';
  }
  render(lang);

  els('.js-download').forEach(function(a){ a.setAttribute('href', DMG_URL); });

  // Stripe Customer Portal のURLが設定されていれば「サブスクの管理・解約」リンクを表示
  if (PORTAL_URL) {
    var ms = el('#footManageSub');
    if (ms) { ms.setAttribute('href', PORTAL_URL); ms.style.display = ''; }
  }

  if (reduced){ demo.gauge = 48; demo.freed = 1.2; demoPaint(); setResultLabel(true); }
  else { demoPaint(); }

  setupReveals();
  setupHeroScroll();
  startGraph();
  setupChatReveal();
  setupDemoTrigger();
})();
