<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071e3"/>
      <stop offset="100%" style="stop-color:#34c759"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
  </defs>

  <!-- Background (macOS rounded square) -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- CPU/Memory Chip Body -->
  <rect x="312" y="312" width="400" height="400" rx="40" fill="url(#chip)" opacity="0.95"/>

  <!-- Chip pins - top -->
  <rect x="392" y="262" width="24" height="70" rx="8" fill="white" opacity="0.8"/>
  <rect x="452" y="262" width="24" height="70" rx="8" fill="white" opacity="0.8"/>
  <rect x="512" y="262" width="24" height="70" rx="8" fill="white" opacity="0.8"/>
  <rect x="572" y="262" width="24" height="70" rx="8" fill="white" opacity="0.8"/>

  <!-- Chip pins - bottom -->
  <rect x="392" y="692" width="24" height="70" rx="8" fill="white" opacity="0.8"/>
  <rect x="452" y="692" width="24" height="70" rx="8" fill="white" opacity="0.8"/>
  <rect x="512" y="692" width="24" height="70" rx="8" fill="white" opacity="0.8"/>
  <rect x="572" y="692" width="24" height="70" rx="8" fill="white" opacity="0.8"/>

  <!-- Chip pins - left -->
  <rect x="262" y="392" width="70" height="24" rx="8" fill="white" opacity="0.8"/>
  <rect x="262" y="452" width="70" height="24" rx="8" fill="white" opacity="0.8"/>
  <rect x="262" y="512" width="70" height="24" rx="8" fill="white" opacity="0.8"/>
  <rect x="262" y="572" width="70" height="24" rx="8" fill="white" opacity="0.8"/>

  <!-- Chip pins - right -->
  <rect x="692" y="392" width="70" height="24" rx="8" fill="white" opacity="0.8"/>
  <rect x="692" y="452" width="70" height="24" rx="8" fill="white" opacity="0.8"/>
  <rect x="692" y="512" width="70" height="24" rx="8" fill="white" opacity="0.8"/>
  <rect x="692" y="572" width="70" height="24" rx="8" fill="white" opacity="0.8"/>

  <!-- AI brain circuit pattern inside chip -->
  <circle cx="432" cy="432" r="20" fill="none" stroke="#0071e3" stroke-width="6"/>
  <circle cx="592" cy="432" r="20" fill="none" stroke="#0071e3" stroke-width="6"/>
  <circle cx="432" cy="592" r="20" fill="none" stroke="#0071e3" stroke-width="6"/>
  <circle cx="592" cy="592" r="20" fill="none" stroke="#0071e3" stroke-width="6"/>
  <circle cx="512" cy="512" r="28" fill="#0071e3"/>

  <!-- Connecting lines (neural network style) -->
  <line x1="452" y1="432" x2="484" y2="512" stroke="#0071e3" stroke-width="4" opacity="0.7"/>
  <line x1="572" y1="432" x2="540" y2="512" stroke="#0071e3" stroke-width="4" opacity="0.7"/>
  <line x1="452" y1="592" x2="484" y2="512" stroke="#0071e3" stroke-width="4" opacity="0.7"/>
  <line x1="572" y1="592" x2="540" y2="512" stroke="#0071e3" stroke-width="4" opacity="0.7"/>
  <line x1="432" y1="452" x2="432" y2="572" stroke="#0071e3" stroke-width="3" opacity="0.5"/>
  <line x1="592" y1="452" x2="592" y2="572" stroke="#0071e3" stroke-width="3" opacity="0.5"/>
  <line x1="452" y1="432" x2="572" y2="432" stroke="#0071e3" stroke-width="3" opacity="0.5"/>
  <line x1="452" y1="592" x2="572" y2="592" stroke="#0071e3" stroke-width="3" opacity="0.5"/>

  <!-- Small dots at intersections -->
  <circle cx="512" cy="512" r="12" fill="white"/>
  <circle cx="512" cy="512" r="8" fill="#34c759"/>
</svg>
